<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Silverhawk Islamic Display</title>

<link rel="stylesheet" href="css/display.css">
</head>

<body>

<div class="container">

<header class="header">

<img id="logo" src="assets/logo/logo.png">

<div class="masjid-info">
<h1 id="masjidName"></h1>
<p id="masjidAddress"></p>
</div>
  <button
id="fullscreenBtn">

Fullscreen

  </button>

</header>

<section class="clock-card">

<div id="clock"></div>
<div id="date"></div>
<div id="hijri"></div>

</section>

<section class="prayer-card">

<h2>Jadwal Sholat</h2>

<div id="prayerTimes"></div>

</section>

<section class="announcement-card">

<h2>Pengumuman</h2>

<div id="announcement"></div>

</section>

  <section class="next-prayer-card">

<h2>Sholat Berikutnya</h2>

<div id="nextPrayerName"></div>
<div id="nextPrayerTime"></div>
<div id="countdown"></div>

  </section>

  <section class="wallpaper-card">

<img
id="wallpaper"
class="wallpaper-img"
src=""
alt="Wallpaper">
</section>

<footer>

<div class="marquee">
<span id="runningText"></span>
</div>

</footer>

</div>

<script src="js/app.js"></script>
  <script src="js/slideshow.js"></script>
  <script src="js/prayer.js"></script>
<script src="js/hijri.js"></script>
<script src="js/fullscreen.js"></script>

</body>
</html>
